<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Tasks</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="theme-green" data-page="index">
    <div class="page">
      <div class="title">Project Tasks</div>

      <div class="toolbar">
        <form id="searchForm" class="toolbar-form">
          <input
            class="input-text"
            type="text"
            name="q"
            placeholder="Search by Task Name"
          />
          <select class="page-select" name="categoryId" id="categorySelect"></select>
          <input type="hidden" name="sort" />
          <input type="hidden" name="dir" />
          <input type="hidden" name="page" value="0" />
          <select class="page-select" name="size">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
          <button class="btn btn-primary" type="submit">Search</button>
          <a class="page-link" id="clearLink" href="index.html">Clear</a>
        </form>
        <a class="btn btn-primary" href="create.html">New Task</a>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><a href="#" data-sort="no">No <span data-sort-indicator="no"></span></a></th>
              <th><a href="#" data-sort="taskName">Task Name <span data-sort-indicator="taskName"></span></a></th>
              <th><a href="#" data-sort="assignedTo">Assigned To <span data-sort-indicator="assignedTo"></span></a></th>
              <th>Category</th>
              <th><a href="#" data-sort="status">Status <span data-sort-indicator="status"></span></a></th>
              <th><a href="#" data-sort="priority">Priority <span data-sort-indicator="priority"></span></a></th>
              <th><a href="#" data-sort="startDate">Start Date <span data-sort-indicator="startDate"></span></a></th>
              <th><a href="#" data-sort="dueDate">Due Date <span data-sort-indicator="dueDate"></span></a></th>
              <th><a href="#" data-sort="percentComplete">% Complete <span data-sort-indicator="percentComplete"></span></a></th>
              <th>RAG</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="todoTable"></tbody>
        </table>
      </div>

      <div class="summary" id="summary"></div>

      <div class="pagination" id="pagination"></div>
    </div>

    <noscript>
      <div class="noscript">This app needs JavaScript enabled.</div>
    </noscript>

    <script src="assets/app.js"></script>
  </body>
</html>
